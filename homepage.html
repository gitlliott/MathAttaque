<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Math Attaque - Home</title>
<link href="https://fonts.googleapis.com/css?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
    :root {
        --red: #e02020; /* [cite: 10, 11] */
        --bg-color: #000000;
        --text-color: #ffffff;
    }

    * { 
        margin: 0; 
        padding: 0; 
        box-sizing: border-box; 
    }

    body { 
        background-color: var(--bg-color); /* [cite: 27] */
        color: var(--text-color); /* [cite: 27] */
        font-family: 'Bebas Neue', sans-serif; /* [cite: 27] */
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .home-content { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        gap: 20px;
    }
    .logo { 
        font-size: clamp(48px, 8vw, 96px); /* [cite: 47] */
        letter-spacing: 5px; /* [cite: 47] */
    }
    .logo .star { 
        color: var(--red); /* [cite: 48] */
    }
    .username-row { 
        display: flex; 
        align-items: center; 
        gap: 10px; /* [cite: 75] */
        font-size: 20px; /* [cite: 76] */
        letter-spacing: 3px; /* [cite: 76] */
    }
    .username-row input { 
        font-family: 'Bebas Neue', sans-serif; /* [cite: 77] */
        font-size: 20px; /* [cite: 77] */
        letter-spacing: 3px; /* [cite: 77] */
        background: transparent; /* [cite: 77] */
        border: none; /* [cite: 77] */
        border-bottom: 2px solid rgba(255,255,255,0.3); /* [cite: 77] */
        color: #fff; /* [cite: 77] */
        padding: 4px 8px; /* [cite: 77] */
        width: 200px; /* [cite: 77] */
        outline: none; /* [cite: 77] */
    }
    .username-row input:focus { 
        border-color: var(--red); /* [cite: 79] */
    }
    .btn { 
        display: inline-block;
        font-size: clamp(18px, 2.8vw, 26px); /* [cite: 54] */
        letter-spacing: 4px; /* [cite: 55] */
        color: #fff; /* [cite: 55] */
        background: var(--red); /* [cite: 60] */
        border: 2px solid var(--red); /* [cite: 60] */
        padding: 13px 60px; /* [cite: 55] */
        min-width: 280px; /* [cite: 55] */
        text-align: center; /* [cite: 55] */
        text-decoration: none; /* Removes link underline */
        transition: background 0.2s;
        cursor: pointer;
    }
    .btn:hover { 
        background: #ff3a3a; /* [cite: 125] */
    }
</style>
</head>
<body>

    <div class="home-content">
        <div class="logo">Math <span class="star">Attaque</span></div>
        
        <div class="username-row">
            <label for="username-input">Player:</label>
            <input id="username-input" type="text" placeholder="Enter username" maxlength="20"> </div>

        <nav class="menu">
            <a href="game.html" class="btn primary">Play</a>
        </nav>
    </div>

</body>
</html>
